<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Gamer - CRUD Productos</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 100%);
            border-bottom: 2px solid #7c3aed;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header span {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: #6b7280;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Formulario */
        .form-card {
            background: #111118;
            border: 1px solid #1e1e2e;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .form-card h2 {
            font-size: 18px;
            font-weight: 600;
            color: #7c3aed;
            margin-bottom: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 12px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 12px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group select {
            background: #0a0a0f;
            border: 1px solid #2d2d3d;
            border-radius: 4px;
            padding: 10px 12px;
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #7c3aed;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #7c3aed;
            color: white;
        }

        .btn-primary:hover { background: #6d28d9; }

        .btn-secondary {
            background: #1e1e2e;
            color: #9ca3af;
        }

        .btn-secondary:hover { background: #2d2d3d; }

        .btn-danger {
            background: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 4px 12px;
            font-size: 13px;
        }

        .btn-danger:hover { background: #ef4444; color: white; }

        .btn-edit {
            background: transparent;
            color: #06b6d4;
            border: 1px solid #06b6d4;
            padding: 4px 12px;
            font-size: 13px;
        }

        .btn-edit:hover { background: #06b6d4; color: white; }

        /* Tabla */
        .table-card {
            background: #111118;
            border: 1px solid #1e1e2e;
            border-radius: 8px;
            overflow: hidden;
        }

        .table-header {
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e1e2e;
        }

        .table-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #06b6d4;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .badge {
            background: #1e1e2e;
            color: #9ca3af;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-family: 'Space Mono', monospace;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 24px;
            font-size: 11px;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #1e1e2e;
        }

        td {
            padding: 14px 24px;
            font-size: 15px;
            border-bottom: 1px solid #0a0a0f;
        }

        tr:hover td { background: #15151f; }

        .cat-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cat-consola     { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }
        .cat-videojuego  { background: #06b6d422; color: #67e8f9; border: 1px solid #06b6d444; }
        .cat-periferico  { background: #f5920022; color: #fbbf24; border: 1px solid #f5920044; }
        .cat-accesorio   { background: #10b98122; color: #6ee7b7; border: 1px solid #10b98144; }

        .precio { font-family: 'Space Mono', monospace; color: #22c55e; }
        .stock  { font-family: 'Space Mono', monospace; }
        .stock-low { color: #ef4444; }

        .actions { display: flex; gap: 6px; }

        /* Toast de notificación */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.3s;
        }

        .toast.show { transform: translateX(0); }
        .toast-success { background: #065f46; color: #6ee7b7; border: 1px solid #10b981; }
        .toast-error   { background: #7f1d1d; color: #fca5a5; border: 1px solid #ef4444; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #4b5563;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Tienda Gamer</h1>
        <span>CRUD Productos // Guía 5 // SQL Server + Node.js</span>
    </div>

    <div class="container">
        <!-- Formulario -->
        <div class="form-card">
            <h2 id="form-title">Nuevo Producto</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="nombre" placeholder="Ej: PlayStation 5">
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="categoria">
                        <option value="consola">Consola</option>
                        <option value="videojuego">Videojuego</option>
                        <option value="periferico">Periférico</option>
                        <option value="accesorio">Accesorio</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Precio (COP)</label>
                    <input type="number" id="precio" placeholder="0" min="0">
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" id="stock" placeholder="0" min="0">
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btn-guardar" onclick="guardarProducto()">Guardar</button>
                <button class="btn btn-secondary" id="btn-cancelar" onclick="cancelarEdicion()" style="display:none;">Cancelar</button>
            </div>
        </div>

        <!-- Tabla de productos -->
        <div class="table-card">
            <div class="table-header">
                <h2>Inventario</h2>
                <span class="badge" id="contador">0 productos</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-body">
                    <tr><td colspan="6" class="empty-state">Cargando productos...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = '/api/productos';
        let editandoId = null;

        // Formatear precio en COP
        function formatCOP(valor) {
            return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(valor);
        }

        // Mostrar notificación
        function toast(mensaje, tipo = 'success') {
            const el = document.getElementById('toast');
            el.textContent = mensaje;
            el.className = `toast toast-${tipo} show`;
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        // Cargar productos desde la API
        async function cargarProductos() {
            try {
                const res = await fetch(API);
                const productos = await res.json();
                const tbody = document.getElementById('tabla-body');
                const contador = document.getElementById('contador');

                contador.textContent = `${productos.length} productos`;

                if (productos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No hay productos registrados</td></tr>';
                    return;
                }

                tbody.innerHTML = productos.map(p => `
                    <tr>
                        <td>${p.id_producto}</td>
                        <td>${p.nombre}</td>
                        <td><span class="cat-tag cat-${p.categoria}">${p.categoria}</span></td>
                        <td class="precio">${formatCOP(p.precio)}</td>
                        <td class="stock ${p.stock <= 5 ? 'stock-low' : ''}">${p.stock}</td>
                        <td class="actions">
                            <button class="btn btn-edit" onclick="editarProducto(${p.id_producto})">Editar</button>
                            <button class="btn btn-danger" onclick="eliminarProducto(${p.id_producto})">Eliminar</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                toast('Error al cargar productos', 'error');
            }
        }

        // Guardar producto (crear o actualizar)
        async function guardarProducto() {
            const datos = {
                nombre:    document.getElementById('nombre').value.trim(),
                categoria: document.getElementById('categoria').value,
                precio:    parseFloat(document.getElementById('precio').value),
                stock:     parseInt(document.getElementById('stock').value)
            };

            if (!datos.nombre || isNaN(datos.precio) || isNaN(datos.stock)) {
                toast('Completa todos los campos', 'error');
                return;
            }

            try {
                const url = editandoId ? `${API}/${editandoId}` : API;
                const method = editandoId ? 'PUT' : 'POST';

                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                const result = await res.json();

                if (!res.ok) {
                    toast(result.error, 'error');
                    return;
                }

                toast(editandoId ? 'Producto actualizado' : 'Producto creado');
                cancelarEdicion();
                cargarProductos();
            } catch (err) {
                toast('Error al guardar', 'error');
            }
        }

        // Cargar datos de un producto para editar
        async function editarProducto(id) {
            try {
                const res = await fetch(`${API}/${id}`);
                const p = await res.json();

                document.getElementById('nombre').value    = p.nombre;
                document.getElementById('categoria').value = p.categoria;
                document.getElementById('precio').value    = p.precio;
                document.getElementById('stock').value     = p.stock;

                editandoId = id;
                document.getElementById('form-title').textContent = `Editando Producto #${id}`;
                document.getElementById('btn-guardar').textContent = 'Actualizar';
                document.getElementById('btn-cancelar').style.display = 'inline-block';
            } catch (err) {
                toast('Error al cargar producto', 'error');
            }
        }

        // Eliminar producto
        async function eliminarProducto(id) {
            if (!confirm('¿Eliminar este producto?')) return;

            try {
                const res = await fetch(`${API}/${id}`, { method: 'DELETE' });

                if (!res.ok) {
                    const result = await res.json();
                    toast(result.error, 'error');
                    return;
                }

                toast('Producto eliminado');
                cargarProductos();
            } catch (err) {
                toast('Error al eliminar', 'error');
            }
        }

        // Cancelar edición y limpiar formulario
        function cancelarEdicion() {
            editandoId = null;
            document.getElementById('nombre').value = '';
            document.getElementById('precio').value = '';
            document.getElementById('stock').value  = '';
            document.getElementById('categoria').value = 'consola';
            document.getElementById('form-title').textContent = 'Nuevo Producto';
            document.getElementById('btn-guardar').textContent = 'Guardar';
            document.getElementById('btn-cancelar').style.display = 'none';
        }

        // Cargar productos al abrir la página
        cargarProductos();
    </script>
</body>
</html>
